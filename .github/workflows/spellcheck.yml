name: Spellcheck
on:
  push:
  pull_request:
jobs:
  Spelling:
    runs-on: ubuntu-latest
    container: {image: "rocker/tidyverse:4.2.1"}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install spelling
        run: if (!require("spelling")) install.packages("spelling")
        shell: Rscript {0}


      - name: Run spelling check test
        run:
              no_errors <- spelling::spell_check_files(path = "sp_ignore_wordlist.txt", ignore = readr::read_lines("sp_ignore_wordlist.txt"))
              spellcheck <- spelling::spell_check_files(list.files(pattern = ".*.qmd$", recursive = TRUE), lang = "en-GB",  ignore = readr::read_lines("sp_ignore_wordlist.txt"))
              if (setdiff(spellcheck, no_error) == 0){
                          print0("Complete")
              } else {
                writeLines(spellcheck, "Errors_detected.txt")}
        shell: Rscript {0}